name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Pre-commit hooks
        run: pre-commit run --all-files

      - name: Linting
        run: flake8 src/ tests/ --max-line-length=120

      - name: Build (verification Python)
        run: python -m compileall src

      - name: Build Docker image
        run: docker build -t mon-projet-flask:ci .

      - name: Tests avec couverture
        run: |
          pytest --cov=src \
            --cov-report=term \
            --cov-report=html:coverage-report \
            --junitxml=test-results/pytest-results.xml \
            -v

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

      - name: Publier les resultats de tests (PR)
        if: github.event_name == 'pull_request' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/pytest-results.xml
